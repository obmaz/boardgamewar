name: Flutter Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    # env:
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          # 타임스탬프를 기반으로 고유한 빌드 번호 생성 (Android versionCode용)
          BUILD_NUMBER=$(date +%s)
          # 날짜를 포함한 빌드 명칭 생성 (Android versionName용)
          BUILD_NAME="1.0.0-$(date +%Y%m%d-%H%M)"
          flutter build apk --debug --no-tree-shake-icons --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7 # 7일 동안 보관
